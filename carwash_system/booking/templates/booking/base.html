{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}Car Wash Booking{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'booking/css/style.css' %}">
</head>

<body>

    <nav class="navbar">
        <div class="nav-name">
            <h5>Car Wash Service</h5>
        </div>

        <div class="nav-check">
            <form method="get">
                <input required type="text" name="car_number" class="inputfield" placeholder="Check Car Status">
                <button class="btn">Check</button>
            </form>

        </div>

    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>



</body>

</html>
